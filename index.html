<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Divalz Creaciones - Hub Bomber Style</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        :root {
            /* Paleta de colores Divalz integrada al estilo Bomber */
            --bg-canvas: #f0f4f8;
            --bomber-frame: #1e293b;   /* El enmarcado oscuro y grueso */
            --bomber-lime: #dcfd8b;    /* Color Lima */
            --bomber-orange: #ff823a;  /* Color Naranja */
            --bomber-purple: #bc84ee;  /* Color Morado */
            --bomber-card-bg: #ffffff;
            
            /* Sombras sólidas y rígidas estilo arcade retro */
            --retro-shadow: 5px 5px 0px 0px var(--bomber-frame);
            --retro-shadow-pop: 7px 7px 0px 0px var(--bomber-frame);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-canvas);
            font-family: 'Plus Jakarta Sans', sans-serif;
            color: var(--bomber-frame);
            padding: 25px 15px;
            display: flex;
            justify-content: center;
            background-image: radial-gradient(circle at 0% 0%, var(--bomber-lime) 0%, transparent 30%),
                              radial-gradient(circle at 100% 100%, var(--bomber-purple) 0%, transparent 30%);
            background-attachment: fixed;
        }

        .app-container {
            width: 100%;
            max-width: 480px; /* Tamaño ideal para vista móvil */
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* --- ESTILO DE CUADROS Y ENMARCADOS (BOMBER FRIEND) --- */
        .bomber-block {
            background: var(--bomber-card-bg);
            border: 3.5px solid var(--bomber-frame);
            border-radius: 16px;
            padding: 20px;
            box-shadow: var(--retro-shadow);
        }

        /* 1. SECCIÓN SUPERIOR: TÍTULO */
        header.main-title {
            background: var(--bomber-lime);
            text-align: center;
            box-shadow: var(--retro-shadow-pop);
            padding: 18px;
        }

        header.main-title h1 {
            font-size: 1.75rem;
            font-weight: 800;
            letter-spacing: -0.02em;
            text-transform: uppercase;
        }

        header.main-title span {
            color: var(--bomber-orange);
        }

        /* TÍTULOS DE LAS SECCIONES INTERNAS */
        .section-title {
            font-size: 0.75rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            margin-bottom: 15px;
            opacity: 0.9;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* ZONA DINÁMICA DE NOTIFICACIONES TIKTOK OPTIMIZADA */
        .notification-zone {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 5px;
        }

        .alert-box {
            background: #fff;
            border: 3.5px solid var(--bomber-frame);
            border-radius: 14px;
            padding: 14px;
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 12px;
            box-shadow: 4px 4px 0px 0px var(--bomber-frame);
            animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        @keyframes popIn {
            from { transform: scale(0.9); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .alert-content {
            display: flex;
            align-items: flex-start;
            gap: 12px;
        }

        .alert-icon-circle {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            border: 2.5px solid var(--bomber-frame);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            color: white;
            flex-shrink: 0;
            margin-top: 2px;
        }

        .bg-tiktok-alert { background: #000000; }

        .alert-text-area h4 {
            font-size: 0.85rem;
            font-weight: 800;
            letter-spacing: -0.01em;
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 2px;
        }

        /* Luz indicadora intermitente tipo Alerta "LIVE" */
        .live-pulse {
            width: 8px;
            height: 8px;
            background-color: #ff3b30;
            border-radius: 50%;
            display: inline-block;
            animation: pulse-animation 1.2s infinite;
        }

        @keyframes pulse-animation {
            0% { transform: scale(0.9); opacity: 1; }
            50% { transform: scale(1.2); opacity: 0.4; }
            100% { transform: scale(0.9); opacity: 1; }
        }

        .alert-text-area p {
            font-weight: 400;
            opacity: 0.7;
            font-size: 0.75rem;
            margin-bottom: 10px;
            line-height: 1.3;
        }

        /* Botón de acción interno estilo Arcade */
        .btn-alert-action {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: var(--bomber-lime);
            border: 2px solid var(--bomber-frame);
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 0.7rem;
            font-weight: 800;
            text-transform: uppercase;
            text-decoration: none;
            color: var(--bomber-frame);
            box-shadow: 2px 2px 0px 0px var(--bomber-frame);
            transition: all 0.1s ease;
        }

        .btn-alert-action:active {
            transform: translate(2px, 2px);
            box-shadow: 0px 0px 0px 0px var(--bomber-frame);
        }

        .btn-close-alert {
            background: none;
            border: none;
            font-size: 1.2rem;
            font-weight: 800;
            color: var(--bomber-frame);
            cursor: pointer;
            padding: 0 4px;
            margin-top: -2px;
        }

        /* 2. SECCIÓN CENTRAL: ÁLBUM HORIZONTAL DE PROYECTOS */
        .bomber-block-gallery {
            padding: 20px 0px 20px 20px;
        }

        .projects-slider {
            display: flex;
            gap: 16px;
            overflow-x: auto;
            padding-bottom: 15px;
            padding-right: 20px;
            scroll-snap-type: x mandatory;
            scroll-behavior: smooth;
            scrollbar-width: thin;
            scrollbar-color: var(--bomber-frame) transparent;
        }

        .project-album-card {
            flex: 0 0 260px;
            scroll-snap-align: start;
            background: #ffffff;
            border: 2.5px solid var(--bomber-frame);
            border-radius: 14px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            box-shadow: 3px 3px 0px 0px var(--bomber-frame);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            cursor: pointer;
        }

        .project-album-card:hover {
            transform: translate(-2px, -2px);
            box-shadow: 5px 5px 0px 0px var(--bomber-frame);
        }

        .project-image-holder {
            width: 100%;
            height: 160px;
            border-bottom: 2.5px solid var(--bomber-frame);
            background: #e2e8f0;
            position: relative;
            overflow: hidden;
        }

        .project-image-holder img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s ease;
        }

        .project-album-card:hover .project-image-holder img {
            transform: scale(1.05);
        }

        .project-details {
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 6px;
            justify-content: space-between;
            flex-grow: 1;
        }

        .project-details h3 {
            font-size: 0.9rem;
            font-weight: 700;
            line-height: 1.3;
            color: var(--bomber-frame);
        }

        .card-footer-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 4px;
        }

        .project-tag {
            font-size: 0.6rem;
            font-weight: 800;
            background: var(--bomber-purple);
            color: white;
            padding: 2px 6px;
            border-radius: 5px;
            text-transform: uppercase;
        }

        .project-date {
            font-size: 0.65rem;
            font-weight: 700;
            opacity: 0.6;
        }

        .scroll-hint {
            font-size: 0.65rem;
            font-weight: 700;
            opacity: 0.4;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-top: -5px;
            padding-right: 20px;
            text-align: right;
        }

        /* 3. SECCIÓN INFERIOR: BOTONES DE REDES */
        .social-grid {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .btn-social {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 14px;
            border: 2.5px solid var(--bomber-frame);
            border-radius: 12px;
            font-size: 0.95rem;
            font-weight: 800;
            text-decoration: none;
            color: var(--bomber-frame);
            box-shadow: 3px 3px 0px 0px var(--bomber-frame);
            transition: all 0.1s ease;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .btn-social:active {
            transform: translate(3px, 3px);
            box-shadow: 0px 0px 0px 0px var(--bomber-frame);
        }

        .btn-tiktok { background: #ffffff; }
        .btn-instagram { background: var(--bomber-orange); color: white; }
        .btn-whatsapp { background: #25d366; color: white; }

        /* --- VISOR EN PANTALLA COMPLETA INTERACTIVO (LIGHTBOX) --- */
        .lightbox-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(30, 41, 59, 0.95);
            backdrop-filter: blur(8px);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .lightbox-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .lightbox-container {
            position: relative;
            width: 90%;
            max-width: 440px;
            background: #ffffff;
            border: 4px solid var(--bomber-frame);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 8px 8px 0px 0px rgba(0,0,0,0.3);
            transform: scale(0.9);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), translateY 0.2s ease;
        }

        .lightbox-overlay.active .lightbox-container {
            transform: scale(1);
        }

        .lightbox-img {
            width: 100%;
            max-height: 60vh;
            object-fit: contain;
            display: block;
            background: #f8fafc;
            border-bottom: 3.5px solid var(--bomber-frame);
        }

        .lightbox-caption {
            padding: 16px;
            background: #ffffff;
            text-align: center;
        }

        .lightbox-caption h3 {
            font-size: 1.05rem;
            font-weight: 800;
            margin-bottom: 4px;
        }

        .lightbox-close {
            position: absolute;
            top: 15px;
            right: 15px;
            width: 36px;
            height: 36px;
            background: var(--bomber-lime);
            border: 2.5px solid var(--bomber-frame);
            border-radius: 50%;
            font-size: 1.2rem;
            font-weight: 800;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 2px 2px 0px 0px var(--bomber-frame);
            z-index: 10;
        }

        .lightbox-close:active {
            transform: translate(1px, 1px);
            box-shadow: 0px 0px 0px 0px var(--bomber-frame);
        }

        .swipe-instruction {
            color: #ffffff;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-top: 15px;
            opacity: 0.7;
            display: flex;
            align-items: center;
            gap: 6px;
            animation: bounce 1.5s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(4px); }
        }
    </style>
</head>
<body>

    <div class="app-container">
        
        <header class="bomber-block main-title">
            <h1>Divalz Creaciones<span>.</span></h1>
        </header>

        <div id="notificationZone" class="notification-zone"></div>

        <main class="bomber-block bomber-block-gallery">
            <h2 class="section-title" style="padding-right: 20px;">
                <i class="fa-solid fa-images"></i> Últimos 10 Proyectos
            </h2>
            
            <div id="projectsSlider" class="projects-slider">
                </div>

            <div class="scroll-hint">
                Desliza para ver más <i class="fa-solid fa-arrow-right"></i>
            </div>
        </main>

        <section class="bomber-block">
            <h2 class="section-title"><i class="fa-solid fa-xs fa-circle-nodes"></i> Enlaces Directos</h2>
            
            <div class="social-grid">
                <a href="https://www.tiktok.com/@divalz_10?_r=1&_t=ZS-96xUKTHTFPs" target="_blank" class="btn-social btn-tiktok">
                    <i class="fa-brands fa-tiktok text-lg"></i> TikTok
                </a>
                <a href="https://www.instagram.com/divalz_10?igsh=bmJuNW0yMW03bjRy" target="_blank" class="btn-social btn-instagram">
                    <i class="fa-brands fa-instagram text-lg"></i> Instagram
                </a>
                <a href="https://wa.me/qr/72NFGJBLCJAXL1" target="_blank" class="btn-social btn-whatsapp">
                    <i class="fa-brands fa-whatsapp text-lg"></i> WhatsApp
                </a>
            </div>
        </section>

    </div>

    <div id="lightboxOverlay" class="lightbox-overlay">
        <button class="lightbox-close" onclick="closeLightbox()">&times;</button>
        
        <div id="lightboxContainer" class="lightbox-container">
            <img id="lightboxImg" class="lightbox-img" src="" alt="Vista previa">
            <div class="lightbox-caption">
                <h3 id="lightboxTitle">Título del Proyecto</h3>
                <span id="lightboxTag" class="project-tag">Categoría</span>
            </div>
        </div>
        
        <div class="swipe-instruction">
            <i class="fa-solid fa-arrow-down"></i> Desliza hacia abajo para salir
        </div>
    </div>

    <script>
        // Data oficial con tus 10 imágenes reales subidas por ti
        const DATA_PROYECTOS = [
            { titulo: "Proyecto Educativo 1", categoria: "Maqueta Escolar", fecha: "Hoy", foto: "https://i.supaimg.com/fb13d9ad-2e6f-4b43-b396-a33f4261b86b/65bed10a-1b47-44f9-97a2-0119c03780c9.png" },
            { titulo: "Proyecto Educativo 2", categoria: "Material Didáctico", fecha: "Ayer", foto: "https://i.supaimg.com/fb13d9ad-2e6f-4b43-b396-a33f4261b86b/8fa88f71-c663-422b-ab9e-2852950464c3.png" },
            { titulo: "Proyecto Educativo 3", categoria: "Póster Educativo", fecha: "Hace 2 días", foto: "https://i.supaimg.com/fb13d9ad-2e6f-4b43-b396-a33f4261b86b/39a8ce1d-55cb-4873-a9fd-202491a8b2b5.png" },
            { titulo: "Proyecto Educativo 4", categoria: "Material Didáctico", fecha: "Hace 3 días", foto: "https://i.supaimg.com/fb13d9ad-2e6f-4b43-b396-a33f4261b86b/642a6eae-b463-4a2b-b171-ba64988df652.png" },
            { titulo: "Proyecto Educativo 5", categoria: "Diseño Gráfico", fecha: "Hace 5 días", foto: "https://i.supaimg.com/fb13d9ad-2e6f-4b43-b396-a33f4261b86b/be9b1020-e851-433f-9017-82183a9be918.png" },
            { titulo: "Proyecto Educativo 6", categoria: "Maqueta Escolar", fecha: "Hace 1 sem", foto: "https://i.supaimg.com/fb13d9ad-2e6f-4b43-b396-a33f4261b86b/28c9d901-88cd-4bbd-a198-021aee85f884.jpg" },
            { titulo: "Proyecto Educativo 7", categoria: "Póster Educativo", fecha: "Hace 1 sem", foto: "https://i.supaimg.com/fb13d9ad-2e6f-4b43-b396-a33f4261b86b/a735aefa-9721-4cdc-ae00-131fe554a188.png" },
            { titulo: "Proyecto Educativo 8", categoria: "Material Didáctico", fecha: "Hace 2 sem", foto: "https://i.supaimg.com/fb13d9ad-2e6f-4b43-b396-a33f4261b86b/dc2c61fe-48aa-4818-bb09-fd3e807570a2.png" },
            { titulo: "Proyecto Educativo 9", categoria: "Prototipo Físico", fecha: "Hace 3 sem", foto: "https://i.supaimg.com/fb13d9ad-2e6f-4b43-b396-a33f4261b86b/32dc4263-4ea5-4586-9537-d203d213630e.jpg" },
            { titulo: "Proyecto Educativo 10", categoria: "Maqueta Escolar", fecha: "Hace 1 mes", foto: "https://i.supaimg.com/fb13d9ad-2e6f-4b43-b396-a33f4261b86b/643c07af-750d-4dfd-8457-75c59815f53c.jpg" }
        ];

        // Renderizado inicial del álbum horizontal
        function inicializarApp() {
            const slider = document.getElementById('projectsSlider');
            slider.innerHTML = ''; 

            DATA_PROYECTOS.forEach((proyecto) => {
                const card = document.createElement('div');
                card.className = 'project-album-card';
                card.onclick = () => openLightbox(proyecto);
                
                card.innerHTML = `
                    <div class="project-image-holder">
                        <img src="${proyecto.foto}" alt="${proyecto.titulo}" loading="lazy">
                    </div>
                    <div class="project-details">
                        <h3>${proyecto.titulo}</h3>
                        <div class="card-footer-info">
                            <span class="project-tag">${proyecto.categoria}</span>
                            <span class="project-date">${proyecto.fecha}</span>
                        </div>
                    </div>
                `;
                slider.appendChild(card);
            });

            // Mostrar el aviso de TikTok real tras 1.2 segundos
            setTimeout(mostrarAlertaTikTokReal, 1200);
        }

        // --- CONTROLADORES DE PANTALLA COMPLETA ---
        function openLightbox(proyecto) {
            document.getElementById('lightboxImg').src = proyecto.foto;
            document.getElementById('lightboxTitle').innerText = proyecto.titulo;
            document.getElementById('lightboxTag').innerText = proyecto.categoria;
            
            document.getElementById('lightboxOverlay').classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeLightbox() {
            document.getElementById('lightboxOverlay').classList.remove('active');
            document.body.style.overflow = '';
            document.getElementById('lightboxContainer').style.transform = '';
        }

        // --- DETECTOR DE SWIPE DOWN PARA CERRAR ---
        let touchStartY = 0;
        let touchEndY = 0;
        const overlay = document.getElementById('lightboxOverlay');
        const cardContainer = document.getElementById('lightboxContainer');

        overlay.addEventListener('touchstart', (e) => {
            touchStartY = e.changedTouches[0].screenY;
        }, { passive: true });

        overlay.addEventListener('touchmove', (e) => {
            let currentY = e.changedTouches[0].screenY;
            let deltaY = currentY - touchStartY;
            if (deltaY > 0) {
                cardContainer.style.transform = `translateY(${deltaY * 0.4}px) scale(0.95)`;
            }
        }, { passive: true });

        overlay.addEventListener('touchend', (e) => {
            touchEndY = e.changedTouches[0].screenY;
            let totalSwipe = touchEndY - touchStartY;
            if (totalSwipe > 100) {
                closeLightbox();
            } else {
                cardContainer.style.transform = '';
            }
        }, { passive: true });


        // --- FUNCIÓN DE ALERTA DINÁMICA CON TU LINK REAL DE TIKTOK ---
        function mostrarAlertaTikTokReal() {
            const zona = document.getElementById('notificationZone');
            if (zona.children.length > 0) return;
            
            const alertBox = document.createElement('div');
            alertBox.className = 'alert-box';
            alertBox.innerHTML = `
                <div class="alert-content">
                    <div class="alert-icon-circle bg-tiktok-alert">
                        <i class="fa-brands fa-tiktok"></i>
                    </div>
                    <div class="alert-text-area">
                        <h4>¡NUEVO VIDEO! <span class="live-pulse"></span></h4>
                        <p>Mira el último lanzamiento interactivo de Divalz Creaciones en TikTok.</p>
                        <a href="https://vt.tiktok.com/ZSQ8UM8bm/" target="_blank" class="btn-alert-action">
                            <i class="fa-solid fa-play"></i> Ver Video
                        </a>
                    </div>
                </div>
                <button class="btn-close-alert" onclick="this.parentElement.remove()">&times;</button>
            `;
            zona.appendChild(alertBox);
        }

        window.onload = inicializarApp;
    </script>
</body>
</html>
