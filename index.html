<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Divalz Creaciones - Hub Gamer Creativo</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        :root {
            /* PALETA: Papelería Creativa + Videojuegos Felices */
            --bg-canvas: #fef9e7;       
            --bomber-frame: #2c1a4d;     
            --bomber-pink: #ff6b9d;      
            --bomber-yellow: #ffd13b;    
            --bomber-cyan: #4cc9f0;      
            --bomber-orange: #ff7a00;    
            --bomber-card-bg: #ffffff;
            
            --retro-shadow: 5px 5px 0px 0px var(--bomber-frame);
            --retro-shadow-pop: 8px 8px 0px 0px var(--bomber-frame);
            --retro-shadow-small: 3px 3px 0px 0px var(--bomber-frame);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-canvas);
            font-family: 'Plus Jakarta Sans', sans-serif;
            color: var(--bomber-frame);
            padding: 25px 15px;
            display: flex;
            justify-content: center;
            background-image: 
                radial-gradient(circle at 20% 20%, rgba(76, 201, 240, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 80% 80%, rgba(255, 107, 157, 0.15) 0%, transparent 40%),
                radial-gradient(var(--bomber-yellow) 15%, transparent 16%),
                radial-gradient(var(--bomber-cyan) 15%, transparent 16%);
            background-size: 100% 100%, 100% 100%, 40px 40px, 40px 40px;
            background-position: 0 0, 0 0, 0 0, 20px 20px;
            background-attachment: fixed;
            animation: bgScroll 20s linear infinite;
        }

        @keyframes bgScroll {
            from { background-position: 0 0, 0 0, 0 0, 20px 20px; }
            to { background-position: 0 0, 0 0, 40px 40px, 60px 60px; }
        }

        .app-container {
            width: 100%;
            max-width: 480px;
            display: flex;
            flex-direction: column;
            gap: 22px;
            z-index: 2;
        }

        .bomber-block {
            background: var(--bomber-card-bg);
            border: 4px solid var(--bomber-frame);
            border-radius: 20px;
            padding: 22px;
            box-shadow: var(--retro-shadow);
        }

        /* CABECERA */
        header.main-title {
            background: var(--bomber-pink);
            color: white;
            text-align: center;
            box-shadow: var(--retro-shadow-pop);
            padding: 20px;
            transform: rotate(-1deg);
            cursor: pointer;
        }

        header.main-title h1 {
            font-size: 2rem;
            font-weight: 800;
            letter-spacing: -0.02em;
            text-transform: uppercase;
            -webkit-text-stroke: 1px var(--bomber-frame);
            text-shadow: 3px 3px 0px var(--bomber-frame);
        }

        header.main-title span { color: var(--bomber-yellow); }

        .section-title {
            font-size: 0.85rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 18px;
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--bomber-frame);
        }

        .section-title i { color: var(--bomber-pink); font-size: 1.1rem; }

        /* NOTIFICACIONES */
        .notification-zone { display: flex; flex-direction: column; gap: 10px; }

        .alert-box {
            background: #ffffff;
            border: 4px solid var(--bomber-frame);
            border-radius: 18px;
            padding: 16px;
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 12px;
            box-shadow: var(--retro-shadow);
            animation: levelUp 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.4) forwards;
        }

        @keyframes levelUp {
            from { transform: translateY(20px) scale(0.8); opacity: 0; }
            to { transform: translateY(0) scale(1); opacity: 1; }
        }

        .alert-content { display: flex; align-items: flex-start; gap: 12px; }

        .alert-icon-circle {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            border: 3px solid var(--bomber-frame);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            color: white;
            flex-shrink: 0;
            background: #000000;
            box-shadow: 2px 2px 0px 0px var(--bomber-frame);
        }

        .alert-text-area h4 {
            font-size: 0.9rem;
            font-weight: 800;
            color: var(--bomber-orange);
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 3px;
        }

        .live-pulse {
            width: 9px;
            height: 9px;
            background-color: #ff3366;
            border-radius: 50%;
            display: inline-block;
            animation: pulse 0.8s infinite alternate;
        }

        @keyframes pulse {
            from { transform: scale(0.8); background-color: #ff3366; box-shadow: 0 0 0px #ff3366; }
            to { transform: scale(1.3); background-color: #ffcc00; box-shadow: 0 0 8px #ff3366; }
        }

        .alert-text-area p {
            font-weight: 600;
            opacity: 0.8;
            font-size: 0.78rem;
            margin-bottom: 12px;
            line-height: 1.4;
        }

        .btn-alert-action {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: var(--bomber-yellow);
            border: 3px solid var(--bomber-frame);
            padding: 8px 14px;
            border-radius: 10px;
            font-size: 0.75rem;
            font-weight: 800;
            text-transform: uppercase;
            text-decoration: none;
            color: var(--bomber-frame);
            box-shadow: var(--retro-shadow-small);
            transition: all 0.1s ease;
        }

        .btn-alert-action:hover {
            transform: translateY(-2px);
            box-shadow: 5px 5px 0px 0px var(--bomber-frame);
            background: #ffe066;
        }

        .btn-alert-action:active { transform: translate(3px, 3px); box-shadow: 0px 0px 0px 0px var(--bomber-frame); }
        .btn-close-alert {
            background: var(--bomber-cyan); border: 2px solid var(--bomber-frame);
            width: 24px; height: 24px; border-radius: 6px; font-size: 0.9rem; font-weight: 800;
            color: var(--bomber-frame); cursor: pointer; display: flex; align-items: center; justify-content: center;
            box-shadow: 1px 1px 0px var(--bomber-frame);
        }

        /* GALLERY SLIDER */
        .bomber-block-gallery { padding: 22px 0px 22px 22px; }
        .projects-slider {
            display: flex; gap: 16px; overflow-x: auto; padding-bottom: 18px; padding-right: 22px;
            scroll-snap-type: x mandatory; scrollbar-width: thin; scrollbar-color: var(--bomber-pink) transparent;
        }

        .project-album-card {
            flex: 0 0 260px; scroll-snap-align: start; background: #ffffff; border: 3px solid var(--bomber-frame);
            border-radius: 16px; overflow: hidden; display: flex; flex-direction: column;
            box-shadow: var(--retro-shadow-small); transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.2s ease;
            cursor: pointer;
        }

        .project-album-card:hover { transform: translateY(-5px) scale(1.02); box-shadow: var(--retro-shadow); border-color: var(--bomber-pink); }
        .project-image-holder { width: 100%; height: 160px; border-bottom: 3px solid var(--bomber-frame); background: #f0f4f8; overflow: hidden; }
        .project-image-holder img { width: 100%; height: 100%; object-fit: cover; }
        
        .project-details { padding: 14px; display: flex; flex-direction: column; gap: 8px; justify-content: space-between; flex-grow: 1; background: #fffdf7; }
        .project-details h3 { font-size: 0.95rem; font-weight: 800; line-height: 1.3; color: var(--bomber-frame); }
        .card-footer-info { display: flex; justify-content: space-between; align-items: center; }

        .scroll-hint { font-size: 0.7rem; font-weight: 800; color: var(--bomber-pink); text-transform: uppercase; letter-spacing: 0.05em; margin-top: -4px; padding-right: 22px; text-align: right; animation: bounceRight 1s infinite alternate; }
        @keyframes bounceRight { from { transform: translateX(0); } to { transform: translateX(-5px); } }

        /* SOCIAL */
        .social-grid { display: flex; flex-direction: column; gap: 14px; }
        .btn-social {
            display: flex; align-items: center; justify-content: center; gap: 12px; padding: 16px; border: 3.5px solid var(--bomber-frame);
            border-radius: 16px; font-size: 1rem; font-weight: 800; text-decoration: none; color: var(--bomber-frame);
            box-shadow: var(--retro-shadow); transition: transform 0.15s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.15s ease;
            text-transform: uppercase; letter-spacing: 0.05em;
        }
        .btn-social:hover { transform: translateY(-4px); box-shadow: var(--retro-shadow-pop); }
        .btn-social:active { transform: translate(5px, 5px); box-shadow: 0px 0px 0px 0px var(--bomber-frame); }
        .btn-tiktok { background: #ffffff; }
        .btn-instagram { background: var(--bomber-orange); color: white; }
        .btn-whatsapp { background: #25d366; color: white; }

        /* --- LIGHTBOX MODAL --- */
        .lightbox-overlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(44, 26, 77, 0.92); backdrop-filter: blur(6px);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 9999; opacity: 0; pointer-events: none; transition: opacity 0.3s ease;
        }

        .lightbox-overlay.active { opacity: 1; pointer-events: auto; }
        .lightbox-wrapper-nav { display: flex; align-items: center; justify-content: center; width: 100%; max-width: 600px; gap: 15px; padding: 0 10px; }

        .lightbox-container {
            position: relative; width: 100%; max-width: 420px; background: #ffffff;
            border: 4px solid var(--bomber-frame); border-radius: 24px; overflow: hidden;
            box-shadow: var(--retro-shadow-pop); transform: scale(0.8);
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.3); user-select: none;
        }

        .lightbox-overlay.active .lightbox-container { transform: scale(1); }
        .lightbox-img-box { position: relative; width: 100%; height: 340px; background: #fafafa; border-bottom: 4px solid var(--bomber-frame); display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .lightbox-img { width: 100%; height: 100%; object-fit: contain; transition: opacity 0.15s ease, transform 0.15s ease; }
        .lightbox-caption { padding: 20px; background: #fffdf7; text-align: center; }
        .lightbox-caption h3 { font-size: 1.2rem; font-weight: 800; margin-bottom: 8px; color: var(--bomber-frame); }

        .btn-nav-game {
            width: 46px; height: 46px; background: var(--bomber-yellow); border: 3px solid var(--bomber-frame);
            border-radius: 12px; font-size: 1.2rem; font-weight: 900; color: var(--bomber-frame);
            display: flex; align-items: center; justify-content: center; cursor: pointer; box-shadow: var(--retro-shadow-small); z-index: 100;
        }
        .btn-nav-game:hover { background: var(--bomber-cyan); }
        .btn-nav-game:active { transform: translate(2px, 2px); box-shadow: 0px 0px var(--bomber-frame); }

        .lightbox-close {
            position: absolute; top: 15px; right: 15px; width: 40px; height: 40px; background: var(--bomber-pink);
            border: 3px solid var(--bomber-frame); border-radius: 50%; font-size: 1.5rem; font-weight: 800; color: white;
            display: flex; align-items: center; justify-content: center; cursor: pointer; box-shadow: var(--retro-shadow-small); z-index: 110;
        }

        .swipe-instruction {
            color: var(--bomber-yellow); font-size: 0.75rem; font-weight: 800; text-transform: uppercase;
            letter-spacing: 0.08em; margin-top: 20px; text-align: center; display: flex; flex-direction: column; gap: 6px; align-items: center;
            text-shadow: 2px 2px 0px var(--bomber-frame);
        }

        @media (max-width: 500px) { .btn-nav-game { display: none; } }
    </style>
</head>
<body>

    <div class="app-container">
        <header class="bomber-block main-title" onclick="playAudio('coin')">
            <h1>Divalz Creaciones<span>!</span></h1>
        </header>

        <div id="notificationZone" class="notification-zone"></div>

        <main class="bomber-block bomber-block-gallery">
            <h2 class="section-title" style="padding-right: 20px;">
                <i class="fa-solid fa-star"></i> Nivel: Últimos 10 Proyectos
            </h2>
            <div id="projectsSlider" class="projects-slider"></div>
            <div class="scroll-hint">¡Desliza para explorar! <i class="fa-solid fa-gamepad"></i></div>
        </main>

        <section class="bomber-block">
            <h2 class="section-title"><i class="fa-solid fa-heart"></i> Bonus Tracks / Enlaces</h2>
            <div class="social-grid">
                <a href="https://www.tiktok.com/@divalz_10?_r=1&_t=ZS-96xUKTHTFPs" target="_blank" class="btn-social btn-tiktok" onclick="playAudio('laser')"><i class="fa-brands fa-tiktok"></i> TikTok</a>
                <a href="https://www.instagram.com/divalz_10?igsh=bmJuNW0yMW03bjRy" target="_blank" class="btn-social btn-instagram" onclick="playAudio('laser')"><i class="fa-brands fa-instagram"></i> Instagram</a>
                <a href="https://wa.me/qr/72NFGJBLCJAXL1" target="_blank" class="btn-social btn-whatsapp" onclick="playAudio('laser')"><i class="fa-brands fa-whatsapp"></i> WhatsApp</a>
            </div>
        </section>
    </div>

    <!-- Lightbox -->
    <div id="lightboxOverlay" class="lightbox-overlay">
        <button class="lightbox-close" onclick="closeLightbox()">&times;</button>
        <div class="lightbox-wrapper-nav">
            <button class="btn-nav-game" onclick="navigateProject(-1)"><i class="fa-solid fa-arrow-left"></i></button>
            <div id="lightboxContainer" class="lightbox-container">
                <div class="lightbox-img-box"><img id="lightboxImg" class="lightbox-img" src="" alt="Preview"></div>
                <div class="lightbox-caption">
                    <h3 id="lightboxTitle">Proyecto</h3>
                    <span id="lightboxTag" class="project-tag">Categoría</span>
                </div>
            </div>
            <button class="btn-nav-game" onclick="navigateProject(1)"><i class="fa-solid fa-arrow-right"></i></button>
        </div>
        <div class="swipe-instruction">
            <span><i class="fa-solid fa-arrows-left-right"></i> Izquierda / Derecha para cambiar</span>
            <span style="opacity: 0.8;"><i class="fa-solid fa-arrows-up-down"></i> Arriba / Abajo para salir</span>
        </div>
    </div>

    <script>
        const DATA_PROYECTOS = [
            { titulo: "Proyecto Educativo 1", categoria: "Maqueta Escolar", fecha: "Hoy", foto: "https://i.supaimg.com/fb13d9ad-2e6f-4b43-b396-a33f4261b86b/65bed10a-1b47-44f9-97a2-0119c03780c9.png" },
            { titulo: "Proyecto Educativo 2", categoria: "Material Didáctico", fecha: "Ayer", foto: "https://i.supaimg.com/fb13d9ad-2e6f-4b43-b396-a33f4261b86b/8fa88f71-c663-422b-ab9e-2852950464c3.png" },
            { titulo: "Proyecto Educativo 3", categoria: "Póster Educativo", fecha: "Hace 2 días", foto: "https://i.supaimg.com/fb13d9ad-2e6f-4b43-b396-a33f4261b86b/39a8ce1d-55cb-4873-a9fd-202491a8b2b5.png" },
            { titulo: "Proyecto Educativo 4", categoria: "Material Didáctico", fecha: "Hace 3 días", foto: "https://i.supaimg.com/fb13d9ad-2e6f-4b43-b396-a33f4261b86b/642a6eae-b463-4a2b-b171-ba64988df652.png" },
            { titulo: "Proyecto Educativo 5", categoria: "Diseño Gráfico", fecha: "Hace 5 días", foto: "https://i.supaimg.com/fb13d9ad-2e6f-4b43-b396-a33f4261b86b/be9b1020-e851-433f-9017-82183a9be918.png" },
            { titulo: "Proyecto Educativo 6", categoria: "Maqueta Escolar", fecha: "Hace 1 sem", foto: "https://i.supaimg.com/fb13d9ad-2e6f-4b43-b396-a33f4261b86b/28c9d901-88cd-4bbd-a198-021aee85f884.jpg" },
            { titulo: "Proyecto Educativo 7", categoria: "Póster Educativo", fecha: "Hace 1 sem", foto: "https://i.supaimg.com/fb13d9ad-2e6f-4b43-b396-a33f4261b86b/a735aefa-9721-4cdc-ae00-131fe554a188.png" },
            { titulo: "Proyecto Educativo 8", categoria: "Material Didáctico", fecha: "Hace 2 sem", foto: "https://i.supaimg.com/fb13d9ad-2e6f-4b43-b396-a33f4261b86b/dc2c61fe-48aa-4818-bb09-fd3e807570a2.png" },
            { titulo: "Proyecto Educativo 9", categoria: "Prototipo Físico", fecha: "Hace 3 sem", foto: "https://i.supaimg.com/fb13d9ad-2e6f-4b43-b396-a33f4261b86b/32dc4263-4ea5-4586-9537-d203d213630e.jpg" },
            { titulo: "Proyecto Educativo 10", categoria: "Maqueta Escolar", fecha: "Hace 1 mes", foto: "https://i.supaimg.com/fb13d9ad-2e6f-4b43-b396-a33f4261b86b/643c07af-750d-4dfd-8457-75c59815f53c.jpg" }
        ];

        let currentProjectIndex = 0;
        let audioCtx = null;

        function initAudio() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
        function playAudio(type) {
            initAudio(); if (!audioCtx) return;
            const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination); const now = audioCtx.currentTime;
            if (type === 'coin') {
                osc.type = 'sine'; osc.frequency.setValueAtTime(587.33, now); osc.frequency.setValueAtTime(880, now + 0.08);
                gain.gain.setValueAtTime(0.1, now); gain.gain.exponentialRampToValueAtTime(0.001, now + 0.35);
                osc.start(now); osc.stop(now + 0.35);
            } else if (type === 'pop') {
                osc.type = 'triangle'; osc.frequency.setValueAtTime(400, now); osc.frequency.exponentialRampToValueAtTime(150, now + 0.12);
                gain.gain.setValueAtTime(0.15, now); gain.gain.linearRampToValueAtTime(0.001, now + 0.12);
                osc.start(now); osc.stop(now + 0.12);
            } else if (type === 'laser') {
                osc.type = 'sawtooth'; osc.frequency.setValueAtTime(800, now); osc.frequency.exponentialRampToValueAtTime(300, now + 0.15);
                gain.gain.setValueAtTime(0.06, now); gain.gain.linearRampToValueAtTime(0.001, now + 0.15);
                osc.start(now); osc.stop(now + 0.15);
            }
        }

        function inicializarApp() {
            const slider = document.getElementById('projectsSlider'); slider.innerHTML = ''; 
            DATA_PROYECTOS.forEach((proyecto, index) => {
                const card = document.createElement('div'); card.className = 'project-album-card';
                card.onclick = () => { playAudio('coin'); openLightbox(index); };
                card.innerHTML = `<div class="project-image-holder"><img src="${proyecto.foto}" alt="${proyecto.titulo}" loading="lazy"></div>
                    <div class="project-details"><h3>${proyecto.titulo}</h3><div class="card-footer-info"><span class="project-tag">${proyecto.categoria}</span><span class="project-date">${proyecto.fecha}</span></div></div>`;
                slider.appendChild(card);
            });
            setTimeout(mostrarAlertaTikTokReal, 1200);
        }

        function updateLightboxContent() {
            const proyecto = DATA_PROYECTOS[currentProjectIndex];
            const imgElement = document.getElementById('lightboxImg');
            imgElement.style.opacity = '0'; imgElement.style.transform = 'scale(0.95)';
            setTimeout(() => {
                imgElement.src = proyecto.foto;
                document.getElementById('lightboxTitle').innerText = proyecto.titulo;
                document.getElementById('lightboxTag').innerText = proyecto.categoria;
                imgElement.style.opacity = '1'; imgElement.style.transform = 'scale(1)';
            }, 150);
        }

        function openLightbox(index) {
            currentProjectIndex = index; updateLightboxContent();
            document.getElementById('lightboxOverlay').classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeLightbox() {
            playAudio('pop'); document.getElementById('lightboxOverlay').classList.remove('active');
            document.body.style.overflow = ''; cardContainer.style.transform = '';
        }

        function navigateProject(direction) {
            playAudio('coin'); currentProjectIndex += direction;
            if (currentProjectIndex >= DATA_PROYECTOS.length) currentProjectIndex = 0;
            else if (currentProjectIndex < 0) currentProjectIndex = DATA_PROYECTOS.length - 1;
            updateLightboxContent();
        }

        window.addEventListener('keydown', (e) => {
            if (!document.getElementById('lightboxOverlay').classList.contains('active')) return;
            if (e.key === 'ArrowRight') navigateProject(1);
            if (e.key === 'ArrowLeft') navigateProject(-1);
            if (e.key === 'ArrowUp' || e.key === 'ArrowDown' || e.key === 'Escape') closeLightbox();
        });

        /* --- MOTOR DE GESTOS ULTRA-OPTIMIZADO (SWIPE HORIZONTAL Y CIERRE VERTICAL BIDIRECCIONAL) --- */
        let touchStartX = 0; let touchStartY = 0;
        const overlay = document.getElementById('lightboxOverlay');
        const cardContainer = document.getElementById('lightboxContainer');

        overlay.addEventListener('touchstart', (e) => {
            touchStartX = e.changedTouches[0].screenX;
            touchStartY = e.changedTouches[0].screenY;
        }, { passive: true });

        overlay.addEventListener('touchmove', (e) => {
            let currentX = e.changedTouches[0].screenX;
            let currentY = e.changedTouches[0].screenY;
            let deltaX = currentX - touchStartX;
            let deltaY = currentY - touchStartY;

            // Respuesta visual fluida si se arrastra verticalmente (Hacia arriba o hacia abajo)
            if (Math.abs(deltaY) > Math.abs(deltaX)) {
                cardContainer.style.transform = `translateY(${deltaY * 0.5}px) scale(${Math.max(0.9, 1 - Math.abs(deltaY)/1000)})`;
            }
        }, { passive: true });

        overlay.addEventListener('touchend', (e) => {
            let touchEndX = e.changedTouches[0].screenX;
            let touchEndY = e.changedTouches[0].screenY;
            let totalSwipeX = touchEndX - touchStartX;
            let totalSwipeY = touchEndY - touchStartY;

            // Determinar eje predominante
            if (Math.abs(totalSwipeX) > Math.abs(totalSwipeY)) {
                // Eje Horizontal -> Cambiar Imagen
                if (totalSwipeX > 50) navigateProject(-1);     // Derecha -> Anterior
                else if (totalSwipeX < -50) navigateProject(1);  // Izquierda -> Siguiente
                cardContainer.style.transform = '';
            } else {
                // Eje Vertical (Tanto hacia Arriba como hacia Abajo con un margen de 70px) -> Salir
                if (Math.abs(totalSwipeY) > 70) {
                    closeLightbox();
                } else {
                    cardContainer.style.transform = '';
                }
            }
        }, { passive: true });

        function mostrarAlertaTikTokReal() {
            const zona = document.getElementById('notificationZone'); if (zona.children.length > 0) return;
            const alertBox = document.createElement('div'); alertBox.className = 'alert-box';
            alertBox.innerHTML = `<div class="alert-content"><div class="alert-icon-circle"><i class="fa-brands fa-tiktok"></i></div>
                    <div class="alert-text-area"><h4>¡NUEVA MISIÓN! <span class="live-pulse"></span></h4><p>Descubre el último lanzamiento interactivo y creativo en nuestro TikTok.</p>
                        <a href="https://vt.tiktok.com/ZSQ8UM8bm/" target="_blank" class="btn-alert-action" onclick="playAudio('laser')"><i class="fa-solid fa-play"></i> Jugar / Ver Video</a></div></div>
                <button class="btn-close-alert" onclick="playAudio('pop'); this.parentElement.remove()">&times;</button>`;
            zona.appendChild(alertBox);
        }

        window.addEventListener('click', initAudio, { once: true });
        window.onload = inicializarApp;
    </script>
</body>
</html>
